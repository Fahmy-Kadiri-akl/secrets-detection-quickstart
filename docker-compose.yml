services:
  secrets-detection:
    image: ghcr.io/fahmy-kadiri-akl/secrets_detection:latest
    container_name: secrets-detection
    ports:
      - "8000:8000"
    environment:
      SECDET_LOG_LEVEL: INFO
    volumes:
      # Host Akeyless profiles (read-only). Works on macOS, Linux, and
      # Windows under WSL2 / Docker Desktop, which map $HOME or
      # %USERPROFILE% transparently.
      - "${HOME}/.akeyless:/root/.akeyless:ro"
      # Persistent SQLite database.
      - secdet-data:/data
    restart: unless-stopped

volumes:
  secdet-data:
