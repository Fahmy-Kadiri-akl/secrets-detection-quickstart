services:
  secrets-detection:
    image: ghcr.io/fahmy-kadiri-akl/secrets_detection:latest
    container_name: secrets-detection
    ports:
      - "8000:8000"
    environment:
      SECDET_LOG_LEVEL: INFO
    volumes:
      # Persistent SQLite database. No host mounts needed: authentication
      # is supplied at request time via a user-pasted t-token.
      - secdet-data:/data
    restart: unless-stopped

volumes:
  secdet-data:
